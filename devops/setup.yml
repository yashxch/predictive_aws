---
- hosts: servers
  become: yes
  gather_facts: yes

  tasks:
    - name: Update system packages
      dnf:
        name: "*"
        state: latest
      retries: 3
      delay: 5

    - name: Install required packages
      dnf:
        name: "{{ packages }}"
        state: present
      vars:
        packages:
          - docker
          - git
          - curl
          - wget
          - python3-pip

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: /home/ec2-user/predictive-maintenance
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Display Docker version
      command: docker --version
      register: docker_version

    - name: Show Docker version
      debug:
        msg: "{{ docker_version.stdout }}"